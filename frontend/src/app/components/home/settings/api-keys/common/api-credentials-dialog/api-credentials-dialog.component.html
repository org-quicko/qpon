<mat-dialog-content class="rounded-[5px] p-6 bg-surface-container-lowest info-dialog-shadow w-[516px] h-auto">
	<div class="flex flex-col gap-8">
		<!-- Header -->
		<div class="flex justify-between items-start">
			<div class="flex flex-col gap-2">
				<div class="size-6">
					<mat-icon class="text-on-surface material-symbols-outlined">vpn_key</mat-icon>
				</div>
				<div class="text-on-surface mat-title-large">API Credentials</div>
			</div>
			<button mat-icon-button class="cursor-pointer" (click)="dialogRef.close()">
				<mat-icon>close</mat-icon>
			</button>
		</div>

		<!-- API Key -->
		<div class="flex flex-col gap-2">
			<div class="mat-body-medium text-on-surface-variant">API Key</div>
			<div class="flex items-center gap-2">
				<div class="mat-body-large text-on-surface font-mono bg-surface-container px-3 py-2 rounded-[5px] flex-1 break-all">
					{{ data.apiKey.key }}
				</div>
				<button mat-icon-button (click)="copyToClipboard(data.apiKey.key || '')" matTooltip="Copy">
					<mat-icon class="material-symbols-outlined">content_copy</mat-icon>
				</button>
			</div>
		</div>

		<!-- Secret Key -->
		@if (data.apiKey.secret) {
		<div class="flex flex-col gap-2">
			<div class="mat-body-medium text-on-surface-variant">Secret Key</div>
			<div class="flex items-center gap-2">
				<div class="mat-body-large text-on-surface font-mono bg-surface-container px-3 py-2 rounded-[5px] flex-1 break-all">
					{{ '•'.repeat(32) }}
				</div>
				<button mat-icon-button (click)="copyToClipboard(data.apiKey.secret || '')" matTooltip="Copy">
					<mat-icon class="material-symbols-outlined">content_copy</mat-icon>
				</button>
			</div>
            <div class="mat-body-small text-error mt-1 flex items-start gap-1">
            <mat-icon class="material-symbols-outlined -mt-1 text-base">warning</mat-icon>
            <span>Save this secret key now. You won't be able to see it again!</span>
          </div>
		</div>
		}

		<!-- Actions -->
		<div class="h-10">
			<mat-dialog-actions class="!p-0 flex justify-start gap-2">
				<button mat-button type="button" (click)="downloadJson()"
					class="bg-primary rounded-full text-on-primary px-6 py-2">
					<mat-icon class="material-symbols-outlined mr-1">download</mat-icon>
					Download credentials
				</button>
			</mat-dialog-actions>
		</div>
	</div>
</mat-dialog-content>
